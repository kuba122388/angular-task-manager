<div class="page">
  <button [routerLink]="['/tasks']" class="btn-back">← Back</button>

  @if(isLoading()) {
    <div class="loading">Loading...</div>
  } @else {
    <div class="card">
      <h2>Task #{{task()?.id}}</h2>
      <p class="title">{{task()?.title}}</p>
      <div class="meta">
        <span>User ID: {{task()?.userId}}</span>
        <span class="status" [class.done]="task()?.completed">
          {{task()?.completed ? 'Done' : 'Pending'}}
        </span>
      </div>
    </div>
  }

  @if(errorMsg()) {
    <p class="error">{{errorMsg()}}</p>
  }
</div>
