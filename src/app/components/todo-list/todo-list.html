<h1>Todo list</h1>
<button (click)="refreshTasks()">Refresh Tasks</button>

@if(isLoading()){
<span>Loading...</span>
}
@else {
    @for (task of tasks(); track task.id) {
    <ul>
        <li>
            <ul>
                <li [routerLink]="['/tasks', task.id]">ID: {{task.id}}</li>
            </ul>
        </li>
    </ul>
    }
}

<h3>{{errorMsg()}}</h3>
<h4>{{isLoading()}}</h4>
